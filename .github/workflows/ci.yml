# CI — push/PR 마다 자동 실행되는 품질 검사 (fix_checklist 7순위 #35)
# 백엔드: pytest (DB·로컬 데이터 필요한 검사는 테스트 스스로 건너뜀) + 커버리지
# 프론트: oxlint + vite build
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt -r scripts/requirements.txt
          pip install pytest pytest-cov httpx  # httpx: TestClient (API 테스트)
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=backend --cov=scripts --cov-report=term

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
